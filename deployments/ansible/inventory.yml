all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    pg_version: 16
    pg_user: postgres
    # In production, replace with vault: pg_password: "{{ vault_pg_password }}"
    pg_password: "postgres"
    replication_user: replicator
    replication_password: replicator
    orchestrator_addr: "{{ hostvars['orchestrator']['ansible_host'] }}:50051"

  children:
    pg_nodes:
      hosts:
        pg-primary:
          ansible_host: 192.168.1.10
          node_id: pg-primary
          pg_role: primary
          pg_port: 5432
          node_agent_http_port: 8081
          node_agent_grpc_port: 50052

        pg-replica1:
          ansible_host: 192.168.1.11
          node_id: pg-replica1
          pg_role: replica
          pg_port: 5432
          node_agent_http_port: 8081
          node_agent_grpc_port: 50052
          replication_type: sync

        pg-replica2:
          ansible_host: 192.168.1.12
          node_id: pg-replica2
          pg_role: replica
          pg_port: 5432
          node_agent_http_port: 8081
          node_agent_grpc_port: 50052
          replication_type: async

    etcd_nodes:
      hosts:
        etcd-1:
          ansible_host: 192.168.1.20
          etcd_peer_port: 2380
          etcd_client_port: 2379
        etcd-2:
          ansible_host: 192.168.1.21
          etcd_peer_port: 2380
          etcd_client_port: 2379
        etcd-3:
          ansible_host: 192.168.1.22
          etcd_peer_port: 2380
          etcd_client_port: 2379

    orchestrator:
      hosts:
        orchestrator:
          ansible_host: 192.168.1.30
          node_id: orchestrator-1
          grpc_port: 50051
          http_port: 8080
          heartbeat_timeout: 10
          quorum_size: 1

    haproxy:
      hosts:
        haproxy:
          ansible_host: 192.168.1.40
          write_port: 5000
          read_port: 5001
          stats_port: 7000
