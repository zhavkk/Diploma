version: "3.9"

# HA PostgreSQL Cluster + Orchestrator
# Запуск: docker compose up -d

networks:
  ha-net:
    driver: bridge

volumes:
  pg-primary-data:
  pg-replica1-data:
  pg-replica2-data:
  etcd-data:

services:

  # ─────────────────────────────────────────
  # etcd — distributed coordination
  # ─────────────────────────────────────────
  etcd:
    image: bitnami/etcd:3.5
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    volumes:
      - etcd-data:/bitnami/etcd
    networks:
      - ha-net
    ports:
      - "2379:2379"

  # ─────────────────────────────────────────
  # PostgreSQL Primary
  # ─────────────────────────────────────────
  pg-primary:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      - ./configs/pg-primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./configs/pg-primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./configs/pg-primary/init-replication.sql:/docker-entrypoint-initdb.d/01-replication.sql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - ha-net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # Node Agent на Primary
  # ─────────────────────────────────────────
  node-agent-primary:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.node-agent
    environment:
      NODE_ID: "pg-primary"
      NODE_ADDR: "node-agent-primary:50052"
      ORCHESTRATOR_ADDR: "orchestrator:50051"
      PG_HOST: "pg-primary"
      PG_USER: postgres
      PG_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      GRPC_ADDR: ":50052"
      HEALTH_ADDR: ":8081"
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
    pid: "service:pg-primary"
    networks:
      - ha-net
    depends_on:
      pg-primary:
        condition: service_healthy
    ports:
      - "8081:8081"

  # ─────────────────────────────────────────
  # PostgreSQL Replica 1 (синхронная)
  # ─────────────────────────────────────────
  pg-replica1:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      PG_PRIMARY_HOST: pg-primary
      REPLICATION_PASSWORD: replicator
    volumes:
      - pg-replica1-data:/var/lib/postgresql/data
      - ./scripts/replica-setup.sh:/replica-setup.sh
    entrypoint: ["/bin/bash", "/replica-setup.sh"]
    networks:
      - ha-net
    ports:
      - "5433:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  node-agent-replica1:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.node-agent
    environment:
      NODE_ID: "pg-replica1"
      NODE_ADDR: "node-agent-replica1:50052"
      ORCHESTRATOR_ADDR: "orchestrator:50051"
      PG_HOST: "pg-replica1"
      PG_USER: postgres
      PG_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      GRPC_ADDR: ":50052"
      HEALTH_ADDR: ":8081"
    volumes:
      - pg-replica1-data:/var/lib/postgresql/data
    pid: "service:pg-replica1"
    networks:
      - ha-net
    depends_on:
      pg-replica1:
        condition: service_healthy
    ports:
      - "8082:8081"

  # ─────────────────────────────────────────
  # PostgreSQL Replica 2 (асинхронная)
  # ─────────────────────────────────────────
  pg-replica2:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      PG_PRIMARY_HOST: pg-primary
      REPLICATION_PASSWORD: replicator
    volumes:
      - pg-replica2-data:/var/lib/postgresql/data
      - ./scripts/replica-setup.sh:/replica-setup.sh
    entrypoint: ["/bin/bash", "/replica-setup.sh"]
    networks:
      - ha-net
    ports:
      - "5434:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  node-agent-replica2:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.node-agent
    environment:
      NODE_ID: "pg-replica2"
      NODE_ADDR: "node-agent-replica2:50052"
      ORCHESTRATOR_ADDR: "orchestrator:50051"
      PG_HOST: "pg-replica2"
      PG_USER: postgres
      PG_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      GRPC_ADDR: ":50052"
      HEALTH_ADDR: ":8081"
    volumes:
      - pg-replica2-data:/var/lib/postgresql/data
    pid: "service:pg-replica2"
    networks:
      - ha-net
    depends_on:
      pg-replica2:
        condition: service_healthy
    ports:
      - "8083:8081"

  # ─────────────────────────────────────────
  # HA Orchestrator (Control Plane)
  # ─────────────────────────────────────────
  orchestrator:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.orchestrator
    environment:
      NODE_ID: "orchestrator-1"
      GRPC_ADDR: ":50051"
      HTTP_ADDR: ":8080"
      HEARTBEAT_TIMEOUT: "10"
      QUORUM_SIZE: "1"
      ETCD_ENDPOINTS: "etcd:2379"
    networks:
      - ha-net
    depends_on:
      - etcd
    ports:
      - "50051:50051"
      - "8080:8080"

  # ─────────────────────────────────────────
  # HAProxy — load balancer
  # ─────────────────────────────────────────
  haproxy:
    image: haproxy:2.9
    volumes:
      - ./configs/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - ha-net
    depends_on:
      - node-agent-primary
      - node-agent-replica1
      - node-agent-replica2
    ports:
      - "5000:5000"
      - "5001:5001"
      - "7000:7000"
