---
# Deploy etcd for distributed coordination

- name: Install etcd
  get_url:
    url: "https://github.com/etcd-io/etcd/releases/download/v3.5.14/etcd-v3.5.14-linux-amd64.tar.gz"
    dest: /tmp/etcd.tar.gz
    mode: '0644'

- name: Extract etcd
  unarchive:
    src: /tmp/etcd.tar.gz
    dest: /tmp
    remote_src: true

- name: Install etcd binaries
  copy:
    src: "/tmp/etcd-v3.5.14-linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: true
  loop:
    - etcd
    - etcdctl

- name: Create etcd data directory
  file:
    path: /var/lib/etcd
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Create etcd systemd unit
  template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
  notify: restart etcd

- name: Enable and start etcd
  systemd:
    name: etcd
    enabled: true
    state: started
    daemon_reload: true
