version: "3.9"

# HA PostgreSQL Cluster + Orchestrator
# Запуск: docker compose up -d

networks:
  ha-net:
    driver: bridge

volumes:
  pg-primary-data:
  pg-replica1-data:
  pg-replica2-data:
  etcd-data:
  prometheus-data:
  grafana-data:

services:

  # ─────────────────────────────────────────
  # etcd — distributed coordination
  # ─────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_NAME: "etcd0"
    volumes:
      - etcd-data:/etcd-data
    networks:
      - ha-net
    ports:
      - "2379:2379"

  # ─────────────────────────────────────────
  # PostgreSQL Primary
  # ─────────────────────────────────────────
  pg-primary:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      - ./configs/pg-primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./configs/pg-primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./configs/pg-primary/init-replication.sql:/docker-entrypoint-initdb.d/01-replication.sql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - ha-net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # Node Agent на Primary
  # ─────────────────────────────────────────
  node-agent-primary:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.node-agent
    environment:
      NODE_ID: "pg-primary"
      NODE_ADDR: "node-agent-primary:50052"
      ORCHESTRATOR_ADDR: "orchestrator:50051"
      PG_HOST: "pg-primary"
      PG_USER: postgres
      PG_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      GRPC_ADDR: ":50052"
      HEALTH_ADDR: ":8081"
      # PostgreSQL connection pool settings (defaults: MaxOpenConns=25, MaxIdleConns=5, ConnMaxLifetime=5m)
      # PG_MAX_OPEN_CONNS: "25"
      # PG_MAX_IDLE_CONNS: "5"
      # PG_CONN_MAX_LIFETIME: "5m"
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
    pid: "service:pg-primary"
    networks:
      - ha-net
    depends_on:
      pg-primary:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health/alive || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # PostgreSQL Replica 1 (синхронная)
  # ─────────────────────────────────────────
  pg-replica1:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      PG_PRIMARY_HOST: pg-primary
      REPLICATION_PASSWORD: replicator
    volumes:
      - pg-replica1-data:/var/lib/postgresql/data
      - ./scripts/replica-setup.sh:/replica-setup.sh
      - ./configs/pg-replica1/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    entrypoint: ["/bin/bash", "/replica-setup.sh"]
    networks:
      - ha-net
    ports:
      - "5433:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  node-agent-replica1:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.node-agent
    environment:
      NODE_ID: "pg-replica1"
      NODE_ADDR: "node-agent-replica1:50052"
      ORCHESTRATOR_ADDR: "orchestrator:50051"
      PG_HOST: "pg-replica1"
      PG_USER: postgres
      PG_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      GRPC_ADDR: ":50052"
      HEALTH_ADDR: ":8081"
      # PostgreSQL connection pool settings (defaults: MaxOpenConns=25, MaxIdleConns=5, ConnMaxLifetime=5m)
      # PG_MAX_OPEN_CONNS: "25"
      # PG_MAX_IDLE_CONNS: "5"
      # PG_CONN_MAX_LIFETIME: "5m"
    volumes:
      - pg-replica1-data:/var/lib/postgresql/data
    pid: "service:pg-replica1"
    networks:
      - ha-net
    depends_on:
      pg-replica1:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    ports:
      - "8082:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health/alive || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # PostgreSQL Replica 2 (асинхронная)
  # ─────────────────────────────────────────
  pg-replica2:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      PG_PRIMARY_HOST: pg-primary
      REPLICATION_PASSWORD: replicator
    volumes:
      - pg-replica2-data:/var/lib/postgresql/data
      - ./scripts/replica-setup.sh:/replica-setup.sh
      - ./configs/pg-replica2/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    entrypoint: ["/bin/bash", "/replica-setup.sh"]
    networks:
      - ha-net
    ports:
      - "5434:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  node-agent-replica2:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.node-agent
    environment:
      NODE_ID: "pg-replica2"
      NODE_ADDR: "node-agent-replica2:50052"
      ORCHESTRATOR_ADDR: "orchestrator:50051"
      PG_HOST: "pg-replica2"
      PG_USER: postgres
      PG_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
      GRPC_ADDR: ":50052"
      HEALTH_ADDR: ":8081"
      # PostgreSQL connection pool settings (defaults: MaxOpenConns=25, MaxIdleConns=5, ConnMaxLifetime=5m)
      # PG_MAX_OPEN_CONNS: "25"
      # PG_MAX_IDLE_CONNS: "5"
      # PG_CONN_MAX_LIFETIME: "5m"
    volumes:
      - pg-replica2-data:/var/lib/postgresql/data
    pid: "service:pg-replica2"
    networks:
      - ha-net
    depends_on:
      pg-replica2:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    ports:
      - "8083:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health/alive || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # HA Orchestrator (Control Plane)
  # ─────────────────────────────────────────
  orchestrator:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.orchestrator
    environment:
      NODE_ID: "orchestrator-1"
      GRPC_ADDR: ":50051"
      HTTP_ADDR: ":8080"
      HEARTBEAT_TIMEOUT: "10"
      QUORUM_SIZE: "1"
      ETCD_ENDPOINTS: "etcd:2379"
      REPLICATION_USER: "replicator"
      REPLICATION_PASSWORD: "replicator"
      REPLICATION_PG_HOSTS: "pg-primary=pg-primary,pg-replica1=pg-replica1,pg-replica2=pg-replica2"
    networks:
      - ha-net
    depends_on:
      - etcd
    ports:
      - "50051:50051"
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─────────────────────────────────────────
  # HAProxy — load balancer
  # ─────────────────────────────────────────
  haproxy:
    image: haproxy:2.9
    volumes:
      - ./configs/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - ha-net
    depends_on:
      - node-agent-primary
      - node-agent-replica1
      - node-agent-replica2
    ports:
      - "5000:5000"
      - "5001:5001"
      - "7000:7000"

  # ─────────────────────────────────────────
  # Prometheus — metrics collection
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - ha-net
    depends_on:
      - orchestrator
      - node-agent-primary
      - node-agent-replica1
      - node-agent-replica2
      - postgres-exporter-primary
      - postgres-exporter-replica1
      - postgres-exporter-replica2
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Grafana — visualization
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - ha-net
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # PostgreSQL Exporters
  # ─────────────────────────────────────────
  postgres-exporter-primary:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@pg-primary:5432/postgres?sslmode=disable"
    networks:
      - ha-net
    depends_on:
      - pg-primary
    ports:
      - "9187:9187"
    restart: unless-stopped

  postgres-exporter-replica1:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@pg-replica1:5432/postgres?sslmode=disable"
    networks:
      - ha-net
    depends_on:
      - pg-replica1
    ports:
      - "9188:9187"
    restart: unless-stopped

  postgres-exporter-replica2:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@pg-replica2:5432/postgres?sslmode=disable"
    networks:
      - ha-net
    depends_on:
      - pg-replica2
    ports:
      - "9189:9187"
    restart: unless-stopped
