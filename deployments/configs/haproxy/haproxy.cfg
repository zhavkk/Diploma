global
    log stdout format raw local0
    maxconn 1000

defaults
    log     global
    mode    tcp
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# ─────────────────────────────────────────
# Stats UI
# ─────────────────────────────────────────
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s

# ─────────────────────────────────────────
# Write endpoint → Primary
# Определение primary через HTTP /health/primary на Node Agent
# 200 OK = primary, 503 = replica/недоступен
# ─────────────────────────────────────────
listen pg_primary
    bind *:5000
    mode tcp
    option httpchk GET /health/primary
    http-check expect status 200

    server pg-primary    pg-primary:5432   check port 8081 inter 2s fall 2 rise 1
    server pg-replica1   pg-replica1:5432  check port 8082 inter 2s fall 2 rise 1 backup
    server pg-replica2   pg-replica2:5432  check port 8083 inter 2s fall 2 rise 1 backup

# ─────────────────────────────────────────
# Read endpoint → Replicas (round-robin)
# Определение реплики через HTTP /health/replica на Node Agent
# ─────────────────────────────────────────
listen pg_replicas
    bind *:5001
    mode tcp
    balance roundrobin
    option httpchk GET /health/replica
    http-check expect status 200

    server pg-replica1  pg-replica1:5432  check port 8082 inter 2s fall 2 rise 1
    server pg-replica2  pg-replica2:5432  check port 8083 inter 2s fall 2 rise 1
    # primary как fallback если обе реплики недоступны
    server pg-primary   pg-primary:5432   check port 8081 inter 2s fall 2 rise 1 backup
