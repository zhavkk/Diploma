# Grafana dashboard provisioning configuration
apiVersion: 1

providers:
  - name: 'HA PostgreSQL Cluster'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
